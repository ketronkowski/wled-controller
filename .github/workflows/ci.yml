name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ketronkowski/wled-backend
  FRONTEND_IMAGE: ghcr.io/ketronkowski/wled-frontend

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Backend tests
        run: ./gradlew :backend:test --no-daemon

      - name: Frontend tests
        run: ./gradlew :frontend:check --no-daemon

  # ── Build & Push ─────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Update Deploy Repo ───────────────────────────────────────────────────
  deploy:
    name: Update Deploy Repo
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy-repo
        uses: actions/checkout@v4
        with:
          repository: ketronkowski/deploy-repo
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          path: deploy-repo

      - name: Update image tags
        run: |
          TAG="${{ github.sha }}"
          FILE="deploy-repo/apps/wled-controller/env/main/values.yaml"
          # Use yq (available on ubuntu-latest) for reliable YAML field updates
          yq -i ".backend.image.tag = \"$TAG\"" "$FILE"
          yq -i ".frontend.image.tag = \"$TAG\"" "$FILE"
          yq -i ".discovery.image.tag = \"$TAG\"" "$FILE"

      - name: Commit and push
        run: |
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/wled-controller/env/main/values.yaml
          git diff --cached --quiet && echo "No image tag changes" && exit 0
          git commit -m "chore(wled-controller): deploy ${{ github.sha }}"
          git push
