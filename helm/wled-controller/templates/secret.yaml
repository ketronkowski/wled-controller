{{- if .Values.mongodb.enabled }}
# In-cluster MongoDB — generate a simple secret pointing to the in-cluster service.
# For production, use external-secrets or manage the secret out-of-band.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mongoSecret }}
  labels:
    {{- include "wled-controller.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  uri: mongodb://{{ include "wled-controller.fullname" . }}-mongo:27017/wled
{{- end }}
