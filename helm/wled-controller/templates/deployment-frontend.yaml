apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wled-controller.fullname" . }}-frontend
  labels:
    {{- include "wled-controller.labels" . | nindent 4 }}
    {{- include "wled-controller.frontendSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wled-controller.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wled-controller.frontendSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
