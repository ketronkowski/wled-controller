apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wled-controller.fullname" . }}-backend
  labels:
    {{- include "wled-controller.labels" . | nindent 4 }}
    {{- include "wled-controller.backendSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wled-controller.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wled-controller.backendSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongoSecret }}
                  key: uri
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
