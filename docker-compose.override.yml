# Development overrides — hot-reloading frontend dev server instead of built nginx
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    command: npm run dev -- --host 0.0.0.0
